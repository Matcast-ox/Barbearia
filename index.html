<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Barbearia Castilho</title>

    <!-- FONTES -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <!-- HERO -->
    <section class="hero">
        <div class="overlay">
            <img src="image.jpeg" class="logo">
            <h1>Barbearia Castilho</h1>
            <p>Seu estilo começa aqui</p>
            <button onclick="agendar()">Entre em contato agora</button>
        </div>
    </section>

    <!-- SERVIÇOS -->
    <section class="servicos">
        <h2>Serviços</h2>
        <div class="cards">
            <div class="card">Cabelo - R$35</div>
            <div class="card">Barba - R$30</div>
            <div class="card">Cabelo + Barba - R$60</div>
            <div class="card">Sombrancelha - R$10</div>
            <div class="card">Luzes - R$100</div>

        </div>
    </section>



    <!-- WHATSAPP -->
    <div class="whatsapp" onclick="agendar()">💬</div>

    <script src="script.js"></script>
</body>
</html>
